# 24 scenarios: 3 subjects per stratum, each crossed with both prompt variants.
# Crossing (every subject gets strict AND natural) isolates the prompt-variant
# effect from subject difficulty -- v1 assigned one variant per subject, which
# confounded the two. Trimmed from 5 to 3 subjects/stratum to keep the API
# call budget close to v1 (24 vs 20) despite the 2x variant multiplier.
# Scoring uses a fixed local embedder (all-MiniLM-L6-v2), independent of LLM provider.

# --- concrete_nature ---
- id: cn_ocean_strict
  stratum: concrete_nature
  subject: ocean
  prompt_variant: strict
  notes: Classic nature anchor

- id: cn_ocean_natural
  stratum: concrete_nature
  subject: ocean
  prompt_variant: natural

